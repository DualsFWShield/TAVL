<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAVL Tool</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0c13">
    
    <!-- iOS Support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TAVL">
    <link rel="apple-touch-icon" href="https://placehold.co/192x192/0f172a/ffffff/png?text=TAVL">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
</head>

<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <button class="burger-btn hidden" id="burger-btn" title="Ouvrir la liste" aria-label="Menu">☰</button>
                <div class="logo">
                    <h1>Relevés TAVL</h1>
                    <p>Analyse locale — Importez le fichier Excel pour commencer</p>
                </div>
            </div>
            <div class="header-controls">
                <button class="action-btn secondary" id="theme-toggle" title="Changer de thème">☀</button>
                <button class="action-btn primary" id="export-xlsx-btn">
                    <span>📥 Exporter</span>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Upload Section -->
            <section id="upload-section" class="upload-container">
                <div class="drop-zone" id="drop-zone">
                    <div class="icon">📂</div>
                    <h2>Glissez-déposez votre fichier (Fichier.xlsx)</h2>
                    <input type="file" id="file-input" accept=".xlsx" hidden>
                </div>
            </section>

            <!-- Split View: Sidebar + Editor -->
            <div id="split-view" class="split-view hidden">
                <aside class="sidebar">
                    <div class="sidebar-header">
                        <h3>Auditoires</h3>
                    </div>
                    <ul id="auditoire-list" class="sidebar-list">
                        <!-- List Items Injected Here -->
                    </ul>
                </aside>

                <section class="editor-panel">
                    <div class="editor-header">
                        <h2 id="current-auditoire-title">Sélectionnez un auditoire</h2>

                        <div class="search-container"
                            style="display: none; flex: 1; max-width: 280px; margin: 0 0.75rem; position: relative;"
                            id="search-container">
                            <input type="text" id="search-input" placeholder="Rechercher" class="search-input-themed">
                            <span
                                style="position: absolute; left: 0.8rem; top: 50%; transform: translateY(-50%); opacity: 0.4; color: var(--text-muted); font-size: 0.85rem;">🔍</span>
                        </div>

                        <div class="editor-actions">
                            <button id="fill-defaults-btn" class="secondary-btn" title="Remplir par défaut">
                                ⚡ Remplir
                            </button>
                            <button id="unlock-btn" class="secondary-btn" title="Mode Édition Forcée">
                                🔓
                            </button>
                            <button id="clear-btn" class="secondary-btn">✕ Fermer</button>
                        </div>
                    </div>

                    <!-- Progress Bar -->
                    <div class="progress-bar-container" id="progress-bar-container" style="display: none;">
                        <div class="progress-info">
                            <span class="progress-label" id="progress-label">Progression</span>
                            <span class="progress-count" id="progress-count">0/0</span>
                        </div>
                        <div class="progress-track">
                            <div class="progress-fill" id="progress-fill" style="width: 0%;"></div>
                        </div>
                    </div>

                    <div id="form-container" class="form-container">
                        <!-- Dynamic Content will be injected here -->
                        <div class="empty-state">Veuillez sélectionner un auditoire dans la liste à gauche.</div>
                    </div>
                </section>

                <!-- Floating Action Buttons -->
                <button id="scroll-top-btn" class="fab-scroll-top" title="Remonter en haut">↑</button>
                <button id="next-field-btn" class="fab-btn hidden" title="Champ suivant">⬇</button>
            </div>

            <!-- Sidebar Overlay (Mobile) -->
            <div id="sidebar-overlay" class="sidebar-overlay hidden"></div>
        </main>

        <!-- Modal Dialog -->
        <div id="modal-overlay" class="modal-overlay hidden">
            <div class="modal-dialog">
                <div class="modal-icon" id="modal-icon"></div>
                <h3 class="modal-title" id="modal-title"></h3>
                <p class="modal-message" id="modal-message"></p>
                <div class="modal-actions" id="modal-actions"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
